    - heading "references/docx-format.md" [level=2] [ref=e20]
    - generic [ref=e21]: "# DOCX 格式约束 生成中文 DOCX《本周热点分析》时使用本文件。除非用户另行指定，保持下面结构，不要临时发明复杂版式。 ## 页面与文字 - 页面：A4，常规页边距。 - 正文语言：中文。 - 标题：`《{领域}本周热点分析》`。 - 副标题：`统计周期：{开始日期} 至 {结束日期}`。 - 字体：除非用户另行指定，DOCX 默认按公文排版偏好设置：标题优先使用方正小标宋，正文优先使用仿宋_GB2312，小标题优先使用黑体或楷体；如果运行环境缺少指定字体，使用文档工具默认中文字体。 - 链接：保留可点击 URL；无法设置超链接时，在来源表中写出完整 URL。 ## 文档结构 1. 标题页信息 - 标题 - 统计周期 - 生成日期 - 资讯总数 2. 核心摘要 - 用 3 到 6 条要点概括本周最重要变化。 - 每条要点聚焦结论，不堆砌资讯标题。 3. 分类热点分析 - 每个分类一个二级标题。 - 分类下先写 1 段综合分析，再列出该分类资讯。 - 每条资讯包含：标题、发布时间、来源、AI 摘要。 4. 来源明细表 - 列：序号、分类、标题、来源、发布时间、原文链接。 - 表格必须覆盖报告中的全部资讯。 ## 单条资讯呈现 每条资讯使用以下顺序： ```text 标题：{title} 时间：{published_at} 来源：{source_name} 摘要：{ai_summary} 链接：{source_url} ``` ## 版式底线 - 不要使用花哨封面、复杂配色或多栏排版。 - 不要让来源链接只出现在脚注；正文或来源表必须能直接看到。 - 不要删除来源明细表。 - 如果资讯超过 30 条，正文每类保留最重要资讯，完整列表仍放入来源明细表。"