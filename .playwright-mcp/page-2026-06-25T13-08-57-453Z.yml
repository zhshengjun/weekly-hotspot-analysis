    - generic [ref=e18]: "# 输出前检查清单 生成《本周热点分析》前，按本清单检查。任何关键项不满足，先修正再输出。 ## 来源检查 - 原始来源优先于转载和聚合页。 - 发布时间落在统计周期内。 - 同一事件没有重复收录。 - 无法确认发布时间的信息没有进入最终报告。 ## 摘要检查 - 单条摘要说明了发生什么、为什么重要、对领域的影响。 - 分类分析不是标题堆砌，而是提炼趋势。 - 核心摘要是 3 到 6 条明确结论。 - 没有编造数据、来源、发布时间或预测。 ## 格式检查 - 报告包含标题、统计周期、核心摘要、分类热点分析、来源明细表。 - 来源明细表覆盖全部入选资讯。 - 链接可见；不能设置超链接时，写出完整 URL。 ## 最终回复检查 最终回复必须包含： - 统计领域 - 统计周期 - 资讯数量 - 分类数量 - 未入选候选资讯数量及原因概述"
