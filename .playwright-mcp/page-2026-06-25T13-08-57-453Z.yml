    - generic [ref=e15]: "# 总结提示词 用于生成《本周热点分析》的摘要、分类分析和核心结论。输出中文，避免空话。面向政务研究材料时，采用稳健、正式、可进入政策简报的表述。 ## 单条资讯摘要 对每条资讯生成 `ai_summary` 时使用： ```text 请基于以下资讯，写一段 80 到 150 字中文摘要。 必须覆盖三点：发生了什么、为什么重要、对“{领域}”的影响。 不要只改写标题，不要加入原文没有支持的判断。 如领域涉及浙江交通、物流、基础设施、流量经济或“六张网”，优先说明其对浙江规划、项目推进、网络协同、降本增效或政策争取的意义。 标题：{title} 来源：{source_name} 发布时间：{published_at} 正文要点：{content_points} ``` ## 分类分析 每个分类开头写 1 段综合分析时使用： ```text 请基于以下同一分类资讯，写一段 150 到 250 字中文分类分析。 说明本类资讯共同反映的趋势、关键变化和可能影响。 不要逐条复述标题；要提炼共同主题。 领域：{领域} 分类：{category} 资讯列表：{items} ``` ## 核心摘要 报告开头的核心摘要使用： ```text 请基于本周全部资讯，生成 3 到 6 条中文核心摘要。 每条摘要聚焦一个明确结论，格式为短句，不超过 60 字。 优先覆盖政策变化、产业趋势、重大项目、公司动态和风险信号。政务研究场景下，结论应能支撑“形势判断、问题识别、工作建议”的后续写作。 领域：{领域} 统计周期：{开始日期} 至 {结束日期} 分类与资讯：{classified_items} ``` ## 总体判断 如需要报告结尾，可使用： ```text 请基于本周资讯，写一段 120 到 200 字中文总体判断。 回答：本周该领域最重要的变化是什么？接下来最值得关注的变量是什么？ 只基于已列资讯，不做投资、法律、医疗等直接建议。 ``` ## 禁止事项 - 不要编造数据、发布日期、来源或链接。 - 不要把“值得关注”“影响深远”等空话当结论。 - 不要把政务研究材料写成投资建议、营销文案或媒体评论。 - 不要输出没有证据支撑的预测。 - 不要把同一条资讯写进多个分类。"
  - generic [ref=e16]:
