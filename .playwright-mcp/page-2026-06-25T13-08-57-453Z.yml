    - generic [ref=e6]: "--- name: weekly-hotspot-analysis # 中文说明：围绕用户指定领域抓取近一周重要资讯，分类整理，并输出中文《本周热点分析》正文。 description: Collect important news from the past week for a user-specified domain, classify items by topic, and output a Chinese weekly hotspot analysis with original source, published time, source URL, and AI summary for every item. Use for weekly news, industry updates, domain monitoring, Zhejiang transportation/logistics/infrastructure policy, flow economy research, and sourced news digests. metadata: # 中文说明：客户端展示用短描述，保持英文便于识别。 short-description: Weekly sourced hotspot analysis allowed-tools: # 中文说明：需要联网检索来源。 - web --- # 本周热点分析 围绕用户指定领域，抓取近一周重要资讯，分类整理，并输出中文《本周热点分析》正文。 ## 默认用户画像 用户通常是浙江省发展规划研究院基础设施研究所的政策研究人员，材料多服务于浙江省发改委、院领导或省级/国家级政策研究场景。用户未另行指定时，默认偏好： - 领域：浙江交通、物流、基础设施、港口、铁路、多式联运、低空物流、流量经济、国家“六张网”及相关政策。 - 视角：省级发展改革、规划研究、政府决策咨询，而不是媒体综述或企业营销。 - 口径：重事实、重政策依据、重项目和指标，少空泛判断；涉及正式材料时使用规范中文政务文风。 - 地域：用户未指定地域但主题与基础设施相关时，优先覆盖浙江及长三角，再补充国家层面和典型省市经验。 - 非政务研究主题只有在用户明确指定时才作为报告领域，不要混入政务热点分析。 ## 工作方式 1. 确认领域和统计周期。用户未指定领域时，追问用户明确重点，不要替用户预设领域。用户未指定周期时，默认使用当前日期往前 7 天；如用户说“本周”，按当前自然周解释，并在报告中写明日期范围。 2. 读取 `references/crawling-guide.md`，收集资讯。优先使用用户指定信源；可用搜索引擎和网页搜索广泛发现线索，不限于政府官网；最终保留官方、监管、协会、主流媒体、公司公告、研究机构、微信公众号等可追溯来源。 3. 过滤和去重。保留发布时间落在统计周期内、与指定领域直接相关、能找到原始来源链接的资讯；同一事件多源报道只保留最原始或最权威来源，必要时在摘要中提及补充来源。 4. 按主题分类。分类名应贴近领域，不要使用空泛分类；同一资讯只能进入一个最主要分类。 5. 读取 `references/summary-prompts.md`，为每条资讯写 AI 摘要。摘要必须说明“发生了什么、为什么重要、对该领域的影响”，避免只改写标题。 6. 输出正文时包含标题、统计周期、核心摘要、分类热点分析和来源明细表。 7. 输出前读取 `references/checklist.md`，检查来源字段、摘要质量、格式和最终回复。 ## 资讯字段 每条资讯必须包含： - `title`：资讯标题 - `category`：分类 - `source_name`：原始来源名称 - `source_url`：原文链接 - `published_at`：发布时间，优先使用原文页面时间；格式建议为 `YYYY-MM-DD HH:MM` 或 `YYYY-MM-DD` - `ai_summary`：AI 摘要 可选字段： - `importance`：重要性，取 `高`、`中`、`低` - `entities`：涉及公司、机构、政策、产品或人物 - `notes`：补充说明，例如多个来源口径差异 ## 输出契约 输出中文《本周热点分析》，并在回复中简要说明： - 统计领域 - 统计周期 - 资讯数量 - 分类数量 - 未能获取发布时间或原始来源的候选资讯数量；最终报告中不得包含这些不合格资讯 ## 质量要求 - 不要把搜索结果页、聚合页、转载页当作原始来源，除非找不到更原始来源，并在 `notes` 中说明。 - 不要引用没有发布时间的资讯；如果页面只有相对时间，先换算为具体日期并说明依据。 - 不要把同一事件拆成多条重复资讯。 - 不要生成没有来源表的报告。 ## 参考文件 - `references/crawling-guide.md`：信息抓取、信源优先级、去重和发布时间判定。 - `references/summary-prompts.md`：单条摘要、分类分析、核心摘要和结论的提示词。 - `references/checklist.md`：输出前检查清单。"
