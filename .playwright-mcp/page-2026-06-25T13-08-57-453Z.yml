    - generic [ref=e12]: "# 信息抓取指导 用于围绕用户指定领域抓取近一周重要资讯。只保留可追溯、有发布时间、与领域直接相关的信息。 ## 抓取范围 - 时间范围：默认当前日期往前 7 天；用户说“本周”时按当前自然周。 - 地域范围：用户未指定时不限制地域；如果领域明显涉及交通、物流、基础设施、流量经济或“六张网”，优先覆盖浙江、长三角和国家层面。 - 信息类型：政策监管、产业事件、公司公告、投融资、技术产品、重大项目、市场数据、行业观点。 ## 信源优先级 可先通过搜索引擎发现线索，不限于政府或机构官网；最终入选来源按下面顺序优先使用： 1. 官方来源：政府、监管机构、交易所、协会、公司官网、公告原文。 2. 权威媒体：主流财经、科技、产业媒体。 3. 研究机构：券商、咨询机构、产业数据库公开材料。 4. 补充来源：微信公众号、转载、聚合页、社交平台，仅在找不到更原始来源时使用，并在备注说明。 面向浙江政务研究材料时，官方来源优先看国家发改委、交通运输部、浙江省政府、浙江省发改委、浙江省交通运输厅、浙江省商务厅、浙江省海港集团、宁波舟山港、各市政府和发改/交通部门。 ## 搜索方式 - 使用领域关键词 + 时间词，例如：`{领域} 本周 政策`、`{领域} 近日 项目`、`{领域} 2026 发布`。浙江基础设施主题可追加 `浙江`、`长三角`、`发改委`、`交通运输厅`、`港口`、`物流`、`多式联运`、`六张网`、`流量经济`。 - 可以用搜索引擎和网页搜索查找线索，不限于政府官网；微信公众号内容也可纳入，但必须能确认公众号名称、发布时间和可访问原文链接。 - 对政策和公告类信息，追加 `site:` 或机构名寻找原文。 - 对热门事件，至少交叉检查 2 个来源，优先保留原始发布者。 - 不要只看标题；必须打开页面确认发布时间、来源和正文相关性。 ## 过滤规则 剔除以下信息： - 没有明确发布时间，且无法从页面上下文可靠推断日期。 - 只是泛泛观点、广告、招商软文或重复转载。 - 与用户指定领域只有关键词重合，没有实质关联。 - 发布时间不在统计周期内，除非用户明确要求保留背景信息。 ## 去重规则 - 同一事件多家报道只算一条。 - 保留最原始或最权威来源。 - 如果多个来源提供不同细节，在 `notes` 中简要说明差异，不新增重复条目。 ## 发布时间判定 优先级： 1. 原文页面明确发布时间。 2. 官方公告日期或发布日期。 3. 页面结构化时间、新闻列表时间。 4. 相对时间换算出的日期；必须在备注说明换算依据。 无法确定发布时间时，不进入最终报告。"
